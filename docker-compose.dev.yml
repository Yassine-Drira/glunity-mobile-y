
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/glunity_mobile
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - glunity_dev_net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    restart: unless-stopped
    networks:
      - glunity_dev_net

networks:
  glunity_dev_net:
    driver: bridge

volumes:
  mongo_dev_data:
