version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/glunity_mobile
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - glunity_net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - glunity_net

  mongo:
    image: mongo:7
    command: ["--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - glunity_net

networks:
  glunity_net:
    driver: bridge

volumes:
  mongo_data:
